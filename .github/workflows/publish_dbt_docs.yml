name: Publish dbt Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'transformation/**'
      - '.github/workflows/publish_dbt_docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Generates the dbt docs and uploads the Pages artifact
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Generate dbt docs
        run: |
          cd transformation
          # Always use --threads 1 for dbt commands to prevent concurrent write lock conflicts on DuckDB/DuckLake
          # If the DuckLake database file exists in the repo, use it. Otherwise, fallback to a temporary empty DuckDB file.
          if [ -f ../storage/orca.ducklake ]; then
            echo "Using existing DuckLake database for generating docs."
            uv run dbt docs generate --threads 1
          else
            echo "DuckLake database not found. Using a temporary empty DuckDB file."
            DBT_DUCKDB_PATH="orca_temp.db" uv run dbt docs generate --threads 1
            rm -f orca_temp.db
          fi

      - name: Prepare Pages directory
        run: |
          mkdir -p public/dbt-docs
          cp transformation/target/index.html public/dbt-docs/
          cp transformation/target/manifest.json public/dbt-docs/
          cp transformation/target/catalog.json public/dbt-docs/
          cp transformation/target/run_results.json public/dbt-docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  # Deployment job: Deploys the uploaded artifact to GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}dbt-docs/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
