version: 2

models:
  - name: stories
    description: "Hacker News stories (posts) containing author, score (points), title, URL, and comment counts."
    columns:
      - name: story_id
        description: "Unique identifier of the story."
        tests:
          - unique
          - not_null
      - name: author
        description: "Username of the author."
      - name: created_at
        description: "Timestamp of when the story was created."
      - name: title
        description: "Title of the story."
      - name: url
        description: "URL of the story."
      - name: score
        description: "Score of the story (points)."
      - name: comment_count
        description: "Number of comments on the story."

  - name: comments
    description: "Hacker News comments, containing comment text, references to parent items, and root story metadata."
    columns:
      - name: comment_id
        description: "Unique identifier of the comment."
        tests:
          - unique
          - not_null
      - name: author
        description: "Username of the author."
      - name: created_at
        description: "Timestamp of when the comment was created."
      - name: parent_id
        description: "ID of the parent story or parent comment."
      - name: text
        description: "Text content of the comment."
      - name: story_id
        description: "ID of the root parent story."
      - name: story_title
        description: "Title of the root parent story."
      - name: story_url
        description: "URL of the root parent story."

